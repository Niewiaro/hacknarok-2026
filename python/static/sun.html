<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ołtarz Słońca</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-1: #180b03;
            --sky-2: #341c08;
            --accent: #ffd86a;
            --accent-2: #fff6da;
            --panel: rgba(33, 17, 4, 0.62);
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
            overscroll-behavior-x: none;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: pan-y;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel Decorative', cursive;
            color: var(--accent-2);
            background:
                radial-gradient(circle at 50% 35%, rgba(255, 216, 106, 0.16) 0%, transparent 28%),
                radial-gradient(circle at center, var(--sky-2) 0%, var(--sky-1) 100%);
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            inset: -25%;
            pointer-events: none;
            background-repeat: no-repeat;
            background-size: 22% 100%, 28% 100%, 18% 100%, 24% 100%;
            opacity: 0.16;
            filter: blur(1px);
            animation: drift 14s linear infinite;
        }

        body::before {
            background-image:
                linear-gradient(115deg, transparent 0 46%, rgba(255, 255, 255, 0.16) 48%, transparent 50%),
                linear-gradient(120deg, transparent 0 42%, rgba(255, 216, 106, 0.16) 45%, transparent 48%),
                linear-gradient(108deg, transparent 0 44%, rgba(255, 255, 255, 0.12) 46%, transparent 49%),
                linear-gradient(116deg, transparent 0 45%, rgba(255, 216, 106, 0.1) 47%, transparent 50%);
        }

        body::after {
            opacity: 0.1;
            animation-duration: 22s;
            animation-direction: reverse;
            background-image:
                linear-gradient(100deg, transparent 0 50%, rgba(255, 255, 255, 0.16) 52%, transparent 55%),
                linear-gradient(112deg, transparent 0 43%, rgba(255, 216, 106, 0.14) 46%, transparent 49%),
                linear-gradient(106deg, transparent 0 48%, rgba(255, 255, 255, 0.1) 50%, transparent 54%),
                linear-gradient(118deg, transparent 0 45%, rgba(255, 216, 106, 0.08) 47%, transparent 51%);
        }

        .shell {
            position: relative;
            z-index: 1;
            width: min(92vw, 520px);
            text-align: center;
            box-sizing: border-box;
            padding: 0 1rem;
        }

        .rune {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: -6px;
            color: var(--accent);
            text-shadow: 0 0 18px rgba(255, 216, 106, 0.85), 0 0 40px rgba(255, 140, 0, 0.3);
            animation: pulse 3s infinite alternate;
            transform-origin: center;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.6rem, 8vw, 4rem);
            letter-spacing: 0.34em;
            text-indent: 0.34em;
            text-shadow: 0 0 16px rgba(255, 216, 106, 0.38);
        }

        .status-container {
            display: inline-block;
            margin: 1.2rem 0 2.2rem;
            padding: 0.7rem 1.2rem;
            border-radius: 999px;
            background: var(--panel);
            border: 1px solid rgba(255, 216, 106, 0.14);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.25);
        }

        #status {
            margin: 0;
            font-family: sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.78);
        }

        .slider-container {
            width: min(100%, 420px);
            margin: 0 auto;
        }

        #value-display {
            font-size: clamp(3.3rem, 11vw, 5rem);
            font-weight: 700;
            line-height: 1;
            color: #fff9df;
            text-shadow: 0 0 18px rgba(255, 216, 106, 0.6);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 48px;
            background: transparent;
            margin-top: 1rem;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255, 216, 106, 0.18), rgba(255, 255, 255, 0.4), rgba(255, 216, 106, 0.18));
            border: 1px solid rgba(255, 216, 106, 0.28);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.45);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 38px;
            height: 38px;
            margin-top: -15px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.9);
            background: radial-gradient(circle at 35% 30%, #fffdf4 0%, #ffe9a9 28%, #ffd86a 62%, #c99413 100%);
            box-shadow: 0 0 14px rgba(255, 216, 106, 0.9), 0 0 30px rgba(255, 255, 255, 0.16);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-track {
            height: 8px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(255, 216, 106, 0.18), rgba(255, 255, 255, 0.4), rgba(255, 216, 106, 0.18));
            border: 1px solid rgba(255, 216, 106, 0.28);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.45);
        }

        input[type="range"]::-moz-range-thumb {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.9);
            background: radial-gradient(circle at 35% 30%, #fffdf4 0%, #ffe9a9 28%, #ffd86a 62%, #c99413 100%);
            box-shadow: 0 0 14px rgba(255, 216, 106, 0.9), 0 0 30px rgba(255, 255, 255, 0.16);
            cursor: pointer;
        }

        @keyframes pulse {
            0% {
                text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff0000;
                transform: scale(1);
            }

            100% {
                text-shadow: 0 0 25px #ffd700, 0 0 50px #ff8c00;
                transform: scale(1.05);
            }
        }

        @keyframes drift {
            0% {
                transform: translateX(-2%) translateY(0);
            }

            100% {
                transform: translateX(2%) translateY(-1%);
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="rune">ᛋ</div>
        <h1>Słońce</h1>
        <div class="status-container">
            <p id="status">Kucie połączenia...</p>
        </div>

        <div class="slider-container">
            <div id="value-display">0</div>
            <input type="range" id="god-slider" min="0" max="255" value="0">
        </div>
    </div>

    <script>
        const godId = "sun";

        // Dynamiczny adres WebSocket
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${protocol}://${window.location.host}/ws/${godId}`;

        let ws;
        let currentValue = 0;

        function connect() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                // Przywrócono stary, lepszy tekst!
                document.getElementById("status").innerText = "Połączono z ołtarzem";
                document.getElementById("status").style.color = "#ffd700";
                document.getElementById("status").style.textShadow = "0 0 10px #ffd700";
            };

            ws.onclose = () => {
                document.getElementById("status").innerText = "Ołtarz zgasł. Nasłuchuję...";
                document.getElementById("status").style.color = "#ff0000";
                document.getElementById("status").style.textShadow = "0 0 10px #ff0000";
                setTimeout(connect, 2000);
            };
        }

        connect();

        const slider = document.getElementById("god-slider");
        const display = document.getElementById("value-display");
        const rune = document.querySelector(".rune");

        function sendValue() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(String(currentValue));
                console.log("Wysłano słońce:", currentValue);
            }
        }

        // FUNKCJA ODŚWIEŻAJĄCA WYGLĄD
        function updateUI(val) {
            currentValue = Number(val);
            slider.value = String(currentValue);
            display.innerText = currentValue;

            const intensity = currentValue / 255;

            // Skalowanie runy
            rune.style.transform = `scale(${1 + (intensity * 0.3)})`;

            // Dynamiczne tło - teraz świeci od początku!
            document.body.style.background = `radial-gradient(circle at center, rgba(${42 + currentValue}, ${31 + (currentValue * 0.5)}, 16, 1) 0%, #000000 100%)`;

            // Dodatkowy blask runy zależny od wartości
            rune.style.textShadow = `0 0 ${10 + (intensity * 40)}px #ff8c00, 0 0 ${20 + (intensity * 60)}px #ff0000`;

            sendValue();
        }

        slider.oninput = () => updateUI(slider.value);

        // Wysyłka zapasowa, gdyby zdarzenie input nie dotarło na czas
        setInterval(() => {
            sendValue();
        }, 1000);

        // Inicjalizacja wyglądu przy starcie
        updateUI(0);
    </script>

</body>

</html>
